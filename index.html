<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Milliy Taxi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        .page { display: none; }
        .page.active { display: block; }
        .milli-btn { background: #ffcc00; font-weight: 800; padding: 15px; border-radius: 12px; width: 100%; }
    </style>
</head>
<body class="bg-gray-50">

    <div id="auth-page" class="page active p-6 min-h-screen flex flex-col justify-center">
        <h1 class="text-4xl font-black text-center text-yellow-500 mb-8 italic">MILLIY TAXI</h1>
        <div id="auth-step-1" class="space-y-4">
            <input id="reg-name" type="text" placeholder="Ismingiz" class="w-full p-4 border rounded-xl outline-none">
            <input id="reg-tel" type="tel" placeholder="+998" class="w-full p-4 border rounded-xl outline-none">
            <select id="reg-role" class="w-full p-4 border rounded-xl outline-none bg-white font-bold">
                <option value="user">Yo'lovchi</option>
                <option value="driver">Haydovchi</option>
                <option value="admin">Admin</option>
            </select>
            <button onclick="sendCode()" class="milli-btn">KODNI OLISH</button>
        </div>
        <div id="auth-step-2" class="hidden space-y-4">
            <p class="text-center text-blue-600 font-bold italic">Tasdiqlash kodi: 1234</p>
            <input id="reg-code" type="number" placeholder="0000" class="w-full p-4 border rounded-xl text-center text-2xl tracking-widest outline-none">
            <button onclick="verifyCode()" class="milli-btn">TASDIQLASH</button>
        </div>
    </div>

    <div id="app-page" class="page min-h-screen">
        <div class="bg-black p-4 text-white flex justify-between items-center">
            <b class="italic text-yellow-400">MILLIY TAXI</b>
            <span id="user-display" class="text-xs opacity-70"></span>
        </div>

        <div id="user-ui" class="p-4 hidden">
            <h3 class="font-bold mb-4">📍 Qayerga boramiz?</h3>
            <select id="route" class="w-full p-4 border rounded-xl mb-4 font-semibold">
                <optgroup label="Toshkent shahridan">
                    <option>Toshkent ➔ Samarqand</option><option>Toshkent ➔ Buxoro</option>
                    <option>Toshkent ➔ Andijon</option><option>Toshkent ➔ Farg'ona</option>
                    <option>Toshkent ➔ Namangan</option><option>Toshkent ➔ Qarshi</option>
                    <option>Toshkent ➔ Termiz</option><option>Toshkent ➔ Urganch</option>
                    <option>Toshkent ➔ Nukus</option><option>Toshkent ➔ Navoiy</option>
                    <option>Toshkent ➔ Jizzax</option><option>Toshkent ➔ Guliston</option>
                </optgroup>
                <optgroup label="Toshkent shahriga">
                    <option>Samarqand ➔ Toshkent</option><option>Buxoro ➔ Toshkent</option>
                    <option>Andijon ➔ Toshkent</option><option>Farg'ona ➔ Toshkent</option>
                    <option>Namangan ➔ Toshkent</option><option>Qarshi ➔ Toshkent</option>
                    <option>Termiz ➔ Toshkent</option><option>Urganch ➔ Toshkent</option>
                    <option>Nukus ➔ Toshkent</option><option>Navoiy ➔ Toshkent</option>
                    <option>Jizzax ➔ Toshkent</option><option>Guliston ➔ Toshkent</option>
                </optgroup>
            </select>
            <button onclick="submitOrder()" class="milli-btn">CHAQIRISH</button>
        </div>

        <div id="list-ui" class="p-4 hidden">
            <h3 class="font-bold mb-4 uppercase text-xs text-gray-400">Yangi buyurtmalar</h3>
            <div id="orders-container" class="space-y-3"></div>
        </div>
    </div>

    <script>
        const socket = io();
        let user = { name: '', tel: '', role: '' };

        function sendCode() {
            user.name = document.getElementById('reg-name').value;
            user.tel = document.getElementById('reg-tel').value;
            user.role = document.getElementById('reg-role').value;
            if(!user.name || !user.tel) return alert("Ma'lumotlarni to'ldiring");
            document.getElementById('auth-step-1').classList.add('hidden');
            document.getElementById('auth-step-2').classList.remove('hidden');
        }

        function verifyCode() {
            const code = document.getElementById('reg-code').value;
            if(code === "1234") {
                document.getElementById('auth-page').classList.remove('active');
                document.getElementById('app-page').classList.add('active');
                document.getElementById('user-display').innerText = user.name + " (" + user.role + ")";
                
                if(user.role === 'user') document.getElementById('user-ui').classList.remove('hidden');
                else document.getElementById('list-ui').classList.remove('hidden');
                loadOrders();
            } else alert("Kod xato!");
        }

        async function submitOrder() {
            const route = document.getElementById('route').value;
            await fetch('/api/order-web', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name: user.name, tel: user.tel, route: route, from: 'Web' })
            });
            alert("Buyurtma yuborildi! ✅");
        }

        async function loadOrders() {
            const res = await fetch('/api/orders');
            const orders = await res.json();
            const container = document.getElementById('orders-container');
            container.innerHTML = '';
            orders.reverse().forEach(o => {
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-yellow-400">
                        <div class="flex justify-between font-bold"><span>${o.name}</span> <span class="text-blue-500">${o.tel}</span></div>
                        <div class="text-sm mt-1">📍 ${o.route || 'Telegram orqali'}</div>
                        <div class="text-[10px] text-gray-400 mt-2">${o.time} | ${o.from}</div>
                    </div>`;
            });
        }

        socket.on('new_order', loadOrders);
    </script>
</body>
</html>
