<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Milliy Taxi O'zbekiston</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <style>
        .page { display: none; height: 100vh; }
        .active { display: flex; flex-direction: column; }
        #map { flex-grow: 1; width: 100%; z-index: 1; }
        .milli-input { width: 100%; padding: 16px; border-radius: 14px; border: 1px solid #ddd; margin-bottom: 12px; outline: none; font-weight: 600; }
        .milli-btn { background: #ffcc00; color: #000; font-weight: 800; padding: 16px; border-radius: 14px; width: 100%; }
        .otp-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body class="bg-gray-50">

    <div id="otp-modal" class="otp-modal">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm text-center shadow-2xl">
            <h2 class="text-xl font-black mb-2">Tasdiqlash kodi</h2>
            <p class="text-sm text-gray-500 mb-6">Sizning kodingiz: <b class="text-blue-600">7788</b></p>
            <input id="otp-input" type="number" class="milli-input text-center text-3xl tracking-[10px]">
            <button onclick="verifyOTP()" class="milli-btn">TASDIQLASH</button>
        </div>
    </div>

    <div id="auth-page" class="page p-8 justify-center">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-black text-yellow-500 italic">MILLIY</h1>
            <p class="text-[10px] uppercase tracking-[3px] font-bold text-gray-400">Online Taxi Xizmati</p>
        </div>
        <input id="u-name" type="text" placeholder="Ismingiz" class="milli-input">
        <input id="u-tel" type="tel" placeholder="+998" class="milli-input">
        <select id="u-role" class="milli-input bg-white">
            <option value="yolovchi">Yo'lovchi</option>
            <option value="haydovchi">Haydovchi</option>
        </select>
        <button onclick="requestOTP()" class="milli-btn">KIRISH</button>
        <button onclick="adminEntry()" class="mt-8 text-gray-400 text-[10px] font-bold uppercase">Admin Boshqaruvi</button>
    </div>

    <div id="app-page" class="page">
        <div id="map"></div>
        <div class="p-6 bg-white shadow-2xl rounded-t-[40px] z-[1000] -mt-10">
            <div id="yolovchi-ui" class="hidden">
                <select id="route-select" class="milli-input bg-gray-50 text-sm">
                    <option disabled selected>Qayerga boramiz?</option>
                    <option>Toshkent ➔ Samarqand</option><option>Samarqand ➔ Toshkent</option>
                    <option>Toshkent ➔ Andijon</option><option>Andijon ➔ Toshkent</option>
                    <option>Toshkent ➔ Farg'ona</option><option>Farg'ona ➔ Toshkent</option>
                    <option>Toshkent ➔ Namangan</option><option>Namangan ➔ Toshkent</option>
                    <option>Toshkent ➔ Buxoro</option><option>Buxoro ➔ Toshkent</option>
                    <option>Toshkent ➔ Qarshi</option><option>Qarshi ➔ Toshkent</option>
                    <option>Toshkent ➔ Termiz</option><option>Termiz ➔ Toshkent</option>
                    <option>Toshkent ➔ Urganch</option><option>Urganch ➔ Toshkent</option>
                    <option>Toshkent ➔ Nukus</option><option>Nukus ➔ Toshkent</option>
                    <option>Toshkent ➔ Jizzax</option><option>Jizzax ➔ Toshkent</option>
                    <option>Toshkent ➔ Guliston</option><option>Guliston ➔ Toshkent</option>
                    <option>Toshkent ➔ Navoiy</option><option>Navoiy ➔ Toshkent</option>
                </select>
                <button onclick="makeOrder()" class="milli-btn">BUYURTMA BERISH</button>
            </div>
            <div id="haydovchi-ui" class="hidden">
                <h3 class="font-black text-[10px] uppercase text-gray-400 mb-4 tracking-widest">Yangi buyurtmalar</h3>
                <div id="order-list" class="space-y-3 overflow-y-auto max-h-[300px]"></div>
            </div>
        </div>
    </div>

    <div id="admin-page" class="page p-6 bg-white">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black italic uppercase">Admin</h2>
            <button onclick="exit()" class="text-red-500 font-bold text-xs">CHIQISH</button>
        </div>
        <div id="admin-list" class="space-y-4 overflow-y-auto"></div>
    </div>

    <script>
        const socket = io();
        let map, routing, user = JSON.parse(localStorage.getItem('milli_session'));

        if(user) startSystem(user.role === 'admin' ? 'admin' : 'app');
        else startSystem('auth');

        function startSystem(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id + '-page').classList.add('active');
            if(id === 'app') initMap();
            if(id === 'admin') loadAdmin();
        }

        function requestOTP() {
            if(!document.getElementById('u-name').value || !document.getElementById('u-tel').value) return alert("To'ldiring!");
            document.getElementById('otp-modal').style.display = 'flex';
        }

        function verifyOTP() {
            if(document.getElementById('otp-input').value === "7788") {
                const u = { name: document.getElementById('u-name').value, tel: document.getElementById('u-tel').value, role: document.getElementById('u-role').value };
                localStorage.setItem('milli_session', JSON.stringify(u));
                location.reload();
            } else alert("Xato kod!");
        }

        function initMap() {
            map = L.map('map', {zoomControl: false}).setView([41.2995, 69.2401], 12);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            if(user.role === 'yolovchi') document.getElementById('yolovchi-ui').classList.remove('hidden');
            else { document.getElementById('haydovchi-ui').classList.remove('hidden'); refreshOrders(); }
        }

        function makeOrder() {
            const rt = document.getElementById('route-select').value;
            if(rt.includes("Qayerga")) return alert("Tanlang!");
            navigator.geolocation.getCurrentPosition(pos => {
                fetch('/api/order-web', {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({name:user.name, tel:user.tel, route:rt, loc:{lat:pos.coords.latitude, lon:pos.coords.longitude}, id:Date.now()})
                }).then(() => alert("Buyurtma ketdi!"));
            });
        }

        async function refreshOrders() {
            const res = await fetch('/api/orders');
            const data = await res.json();
            const list = document.getElementById('order-list');
            list.innerHTML = '';
            data.filter(o => o.status === 'Kutilmoqda').forEach(o => {
                list.innerHTML += `<div class="p-4 bg-gray-50 rounded-2xl border flex justify-between items-center shadow-sm">
                    <div class="text-xs"><b>${o.route}</b><br>${o.name}: ${o.tel}</div>
                    <button onclick="drawRoute(${o.loc.lat}, ${o.loc.lon})" class="bg-black text-white px-4 py-2 rounded-xl text-[10px] font-bold">YO'L</button>
                </div>`;
            });
        }

        function drawRoute(lat, lon) {
            navigator.geolocation.getCurrentPosition(pos => {
                if(routing) map.removeControl(routing);
                routing = L.Routing.control({
                    waypoints: [ L.latLng(pos.coords.latitude, pos.coords.longitude), L.latLng(lat, lon) ],
                    lineOptions: { styles: [{ color: '#ffcc00', weight: 8 }] },
                    createMarker: () => null
                }).addTo(map);
            });
        }

        async function loadAdmin() {
            const res = await fetch('/api/orders');
            const data = await res.json();
            const list = document.getElementById('admin-list');
            list.innerHTML = '';
            data.reverse().forEach(o => {
                list.innerHTML += `<div class="p-4 bg-gray-50 rounded-2xl flex justify-between items-center border">
                    <div class="text-[10px]"><b>${o.name}</b> (${o.route})</div>
                    <button onclick="del(${o.id})" class="text-red-500 font-bold">✕</button>
                </div>`;
            });
        }

        async function del(id) {
            if(confirm("O'chirish?")) {
                await fetch('/api/delete-order', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({id}) });
                loadAdmin();
            }
        }

        function adminEntry() {
            if(prompt("Parol:") === "0000") {
                localStorage.setItem('milli_session', JSON.stringify({role: 'admin'}));
                location.reload();
            }
        }

        function exit() { localStorage.clear(); location.reload(); }
        socket.on('update', () => { if(user?.role === 'haydovchi') refreshOrders(); if(user?.role === 'admin') loadAdmin(); });
    </script>
</body>
</html>
