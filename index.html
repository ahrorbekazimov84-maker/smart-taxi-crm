<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yandex Taxi Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f3f4f6; overflow: hidden; }
        .page { display: none; height: 100vh; width: 100%; position: fixed; top: 0; left: 0; background: #fff; }
        .page.active { display: flex; flex-direction: column; }
        #map { flex-grow: 1; width: 100%; z-index: 1; }
        .sheet { background: white; border-radius: 24px 24px 0 0; padding: 20px; box-shadow: 0 -10px 25px rgba(0,0,0,0.1); z-index: 1000; }
        .yandex-btn { background: #ffcc00; color: #000; font-weight: 800; padding: 18px; border-radius: 18px; width: 100%; }
        .input-group { background: #f0f0f0; border-radius: 12px; padding: 14px; margin-bottom: 10px; }
        select { background: transparent; width: 100%; outline: none; border: none; font-size: 16px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <div id="home-page" class="page active bg-black text-white justify-center p-8">
        <h1 class="text-4xl font-black mb-12 italic text-center tracking-tighter">Yandex Go</h1>
        <div onclick="startApp('passenger')" class="bg-zinc-900 p-6 rounded-3xl mb-4 flex items-center gap-4 border-l-4 border-yellow-400 active:scale-95 transition">
            <span class="text-3xl">📱</span>
            <div><b class="text-lg block">Yo'lovchi</b><p class="text-xs text-gray-500">Taxi chaqirish</p></div>
        </div>
        <div onclick="startApp('driver')" class="bg-zinc-900 p-6 rounded-3xl mb-12 flex items-center gap-4 border-l-4 border-white active:scale-95 transition">
            <span class="text-3xl">🚕</span>
            <div><b class="text-lg block">Haydovchi</b><p class="text-xs text-gray-500">Buyurtma olish</p></div>
        </div>
    </div>

    <div id="main-dashboard" class="page">
        <div id="map"></div>
        <div class="sheet">
            <div class="w-10 h-1.5 bg-gray-300 rounded-full mx-auto mb-6"></div>
            
            <div id="passenger-ui" class="hidden">
                <div class="input-group">
                    <select id="dest">
                        <option disabled selected>Qayerga boramiz?</option>
                        <optgroup label="Toshkentdan chiqish">
                            <option value="Toshkent ➔ Samarqand">Toshkent ➔ Samarqand</option>
                            <option value="Toshkent ➔ Buxoro">Toshkent ➔ Buxoro</option>
                            <option value="Toshkent ➔ Andijon">Toshkent ➔ Andijon</option>
                            <option value="Toshkent ➔ Farg'ona">Toshkent ➔ Farg'ona</option>
                            <option value="Toshkent ➔ Namangan">Toshkent ➔ Namangan</option>
                            <option value="Toshkent ➔ Qarshi">Toshkent ➔ Qarshi</option>
                            <option value="Toshkent ➔ Termiz">Toshkent ➔ Termiz</option>
                            <option value="Toshkent ➔ Urganch">Toshkent ➔ Urganch</option>
                            <option value="Toshkent ➔ Nukus">Toshkent ➔ Nukus</option>
                            <option value="Toshkent ➔ Navoiy">Toshkent ➔ Navoiy</option>
                            <option value="Toshkent ➔ Jizzax">Toshkent ➔ Jizzax</option>
                            <option value="Toshkent ➔ Guliston">Toshkent ➔ Guliston</option>
                        </optgroup>
                        <optgroup label="Toshkentga kelish">
                            <option value="Samarqand ➔ Toshkent">Samarqand ➔ Toshkent</option>
                            <option value="Buxoro ➔ Toshkent">Buxoro ➔ Toshkent</option>
                            <option value="Andijon ➔ Toshkent">Andijon ➔ Toshkent</option>
                            <option value="Farg'ona ➔ Toshkent">Farg'ona ➔ Toshkent</option>
                            <option value="Namangan ➔ Toshkent">Namangan ➔ Toshkent</option>
                            <option value="Qarshi ➔ Toshkent">Qarshi ➔ Toshkent</option>
                            <option value="Termiz ➔ Toshkent">Termiz ➔ Toshkent</option>
                            <option value="Urganch ➔ Toshkent">Urganch ➔ Toshkent</option>
                            <option value="Nukus ➔ Toshkent">Nukus ➔ Toshkent</option>
                            <option value="Navoiy ➔ Toshkent">Navoiy ➔ Toshkent</option>
                            <option value="Jizzax ➔ Toshkent">Jizzax ➔ Toshkent</option>
                            <option value="Guliston ➔ Toshkent">Guliston ➔ Toshkent</option>
                        </optgroup>
                    </select>
                </div>
                <button onclick="orderTaxi()" class="yandex-btn">TAXI CHAQIRISH</button>
            </div>

            <div id="driver-ui" class="hidden text-center">
                <h3 class="font-bold text-gray-400 text-xs mb-4 uppercase tracking-widest">Yangi buyurtmalar</h3>
                <div id="list" class="space-y-3 max-h-60 overflow-y-auto"></div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let role = '', map, markers = {};

        function startApp(r) {
            role = r;
            document.getElementById('home-page').classList.remove('active');
            document.getElementById('main-dashboard').classList.add('active');
            
            if(role === 'passenger') document.getElementById('passenger-ui').classList.remove('hidden');
            else document.getElementById('driver-ui').classList.remove('hidden');

            if(!map) {
                map = L.map('map', {zoomControl:false}).setView([41.2995, 69.2401], 12);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            }
            yuklash();
        }

        async function orderTaxi() {
            const dest = document.getElementById('dest').value;
            if(dest.includes("?")) return alert("Yo'nalishni tanlang!");
            
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await fetch('/buyurtma/berish', {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({ 
                        tel: "Mijoz", 
                        yonalish: dest, 
                        mijozLoc: {lat: pos.coords.latitude, lon: pos.coords.longitude} 
                    })
                });
                alert("Buyurtmangiz yuborildi! 🚕");
            });
        }

        async function yuklash() {
            const res = await fetch('/admin/buyurtmalar');
            const data = await res.json();
            const list = document.getElementById('list');
            if(!list) return;
            list.innerHTML = '';
            
            Object.values(markers).forEach(m => map.removeLayer(m));
            markers = {};

            data.forEach(item => {
                if(item.holati === 'Kutilmoqda') {
                    markers[item._id] = L.marker([item.mijozLoc.lat, item.mijozLoc.lon]).addTo(map);
                    
                    if(role === 'driver') {
                        list.innerHTML += `
                        <div class="bg-gray-50 p-4 rounded-2xl flex justify-between items-center border border-yellow-200">
                            <div class="text-left"><b class="text-sm block">${item.yonalish}</b><span class="text-[10px] text-gray-400">${item.vaqt}</span></div>
                            <button onclick="qabul('${item._id}')" class="bg-black text-white px-4 py-2 rounded-xl text-xs font-bold">OLISH</button>
                        </div>`;
                    }
                }
            });
        }

        async function qabul(id) {
            await fetch('/buyurtma/qabul', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({ orderId: id, haydovchiIsm: "Haydovchi" })
            });
            alert("Siz yo'lga chiqdingiz! ✅");
            yuklash();
        }

        socket.on('yangilash_chiqdi', yuklash);
    </script>
</body>
</html>
