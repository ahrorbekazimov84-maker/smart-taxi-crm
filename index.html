<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yandex Taxi Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f3f4f6; overflow: hidden; }
        .page { display: none; height: 100vh; width: 100%; position: fixed; top: 0; left: 0; background: #fff; }
        .page.active { display: flex; flex-direction: column; }
        #map { flex-grow: 1; width: 100%; z-index: 1; }
        .sheet { background: white; border-radius: 24px 24px 0 0; padding: 20px; box-shadow: 0 -10px 25px rgba(0,0,0,0.1); z-index: 1000; }
        .yandex-btn { background: #ffcc00; color: #000; font-weight: 800; padding: 18px; border-radius: 18px; width: 100%; transition: transform 0.1s; }
        .yandex-btn:active { transform: scale(0.96); }
        .input-group { background: #f0f0f0; border-radius: 12px; padding: 14px; margin-bottom: 10px; display: flex; align-items: center; }
        .input-group select { background: transparent; width: 100%; outline: none; border: none; font-size: 16px; font-weight: 600; }
    </style>
</head>
<body>

    <div id="home-page" class="page active bg-black text-white justify-center p-8 text-center">
        <h1 class="text-4xl font-black mb-12 italic tracking-tighter">Yandex Go</h1>
        <div onclick="showLogin('passenger')" class="bg-zinc-900 p-6 rounded-3xl mb-4 flex items-center gap-4 border-l-4 border-yellow-400 text-left active:bg-zinc-800">
            <span class="text-3xl">📱</span>
            <div><b class="text-lg block">Yo'lovchi</b><p class="text-xs text-gray-500">Taxi buyurtma qilish</p></div>
        </div>
        <div onclick="showLogin('driver')" class="bg-zinc-900 p-6 rounded-3xl mb-12 flex items-center gap-4 border-l-4 border-white text-left active:bg-zinc-800">
            <span class="text-3xl">🚕</span>
            <div><b class="text-lg block">Haydovchi</b><p class="text-xs text-gray-500">Buyurtma olish</p></div>
        </div>
        <button onclick="showLogin('admin')" class="text-gray-500 underline text-sm">Boshqaruv Paneli</button>
    </div>

    <div id="login-page" class="page p-6">
        <button onclick="location.reload()" class="mb-10 text-2xl font-bold">✕</button>
        <div id="auth-container"></div>
    </div>

    <div id="main-dashboard" class="page">
        <div id="map"></div>
        <div class="sheet">
            <div class="w-10 h-1.5 bg-gray-300 rounded-full mx-auto mb-6"></div>
            <div id="app-content"></div>
        </div>
    </div>

    <script>
        const socket = io();
        let currentRole = '', userTel = '', sentOTP = '', map, markers = {};

        function showLogin(role) {
            currentRole = role;
            document.getElementById('home-page').classList.remove('active');
            document.getElementById('login-page').classList.add('active');
            const container = document.getElementById('auth-container');

            if(role === 'admin') {
                container.innerHTML = `<h2 class="text-2xl font-bold mb-6">Admin Kirish</h2>
                    <div class="input-group">👤<input id="adm_login" type="text" placeholder="Login" class="ml-2 bg-transparent outline-none w-full"></div>
                    <div class="input-group">🔒<input id="adm_pass" type="password" placeholder="Parol" class="ml-2 bg-transparent outline-none w-full"></div>
                    <button onclick="loginAdmin()" class="yandex-btn mt-4">KIRISH</button>`;
            } else {
                container.innerHTML = `<h2 class="text-2xl font-bold mb-2">${role==='driver'?'Haydovchi':'Yo\'lovchi'}</h2>
                    <p class="text-gray-400 mb-8 text-sm">Raqamingizni tasdiqlang</p>
                    <div class="input-group">📞<input id="user_tel" type="tel" value="+998" class="ml-2 bg-transparent outline-none w-full"></div>
                    <div id="otp-box" class="input-group hidden">🔑<input id="user_code" type="number" placeholder="Kod" class="ml-2 bg-transparent outline-none w-full"></div>
                    <button id="auth-btn" onclick="sendSMS()" class="yandex-btn mt-4">DAVOM ETISH</button>`;
            }
        }

        async function sendSMS() {
            userTel = document.getElementById('user_tel').value;
            const res = await fetch('/auth/send-code', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tel:userTel}) });
            const data = await res.json();
            sentOTP = data.debug_code; alert("TASDIQLASH KODI: " + sentOTP);
            document.getElementById('otp-box').classList.remove('hidden');
            const btn = document.getElementById('auth-btn'); btn.innerText = "TASDIQLASH"; btn.onclick = verifyOTP;
        }

        function verifyOTP() {
            if(document.getElementById('user_code').value == sentOTP) startDashboard();
            else alert("Xato kod!");
        }

        async function loginAdmin() {
            const res = await fetch('/admin/login', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({login:document.getElementById('adm_login').value, pass:document.getElementById('adm_pass').value})
            });
            if(res.ok) startDashboard(); else alert("Xato!");
        }

        function startDashboard() {
            document.getElementById('login-page').classList.remove('active');
            document.getElementById('main-dashboard').classList.add('active');
            if(!map) {
                map = L.map('map', {zoomControl:false}).setView([41.2995, 69.2401], 12);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            }
            loadInterface();
            yuklash();
        }

        function loadInterface() {
            const content = document.getElementById('app-content');
            if(currentRole === 'passenger') {
                content.innerHTML = `<div class="input-group">🏁
                    <select id="dest">
                        <option disabled selected>Qayerga boramiz?</option>
                        <optgroup label="Toshkentdan">
                            <option>Toshkent ➔ Samarqand</option><option>Toshkent ➔ Buxoro</option>
                            <option>Toshkent ➔ Andijon</option><option>Toshkent ➔ Farg'ona</option>
                            <option>Toshkent ➔ Namangan</option><option>Toshkent ➔ Navoiy</option>
                            <option>Toshkent ➔ Qarshi</option><option>Toshkent ➔ Termiz</option>
                            <option>Toshkent ➔ Jizzax</option><option>Toshkent ➔ Guliston</option>
                            <option>Toshkent ➔ Urganch</option><option>Toshkent ➔ Nukus</option>
                        </optgroup>
                        <optgroup label="Viloyatlardan">
                            <option>Samarqand ➔ Toshkent</option><option>Buxoro ➔ Toshkent</option>
                            <option>Andijon ➔ Toshkent</option><option>Farg'ona ➔ Toshkent</option>
                            <option>Namangan ➔ Toshkent</option><option>Navoiy ➔ Toshkent</option>
                            <option>Qarshi ➔ Toshkent</option><option>Termiz ➔ Toshkent</option>
                            <option>Jizzax ➔ Toshkent</option><option>Guliston ➔ Toshkent</option>
                            <option>Urganch ➔ Toshkent</option><option>Nukus ➔ Toshkent</option>
                        </optgroup>
                    </select></div>
                    <button onclick="orderTaxi()" class="yandex-btn mt-2 shadow-lg">TAXI CHAQIRISH</button>`;
            } else if(currentRole === 'driver') {
                content.innerHTML = `<h3 class="font-bold mb-4 text-xs text-gray-400 uppercase">Yangi buyurtmalar</h3><div id="list" class="space-y-3 overflow-y-auto max-h-72"></div>`;
            } else {
                content.innerHTML = `<h3 class="font-bold mb-4 text-xs text-red-500 uppercase">Admin Control</h3><div id="list" class="space-y-2 overflow-y-auto max-h-72"></div>`;
            }
        }

        async function orderTaxi() {
            const dest = document.getElementById('dest').value;
            if(dest.includes("?")) return alert("Manzilni tanlang!");
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await fetch('/buyurtma/berish', {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({ ism: userTel, tel: userTel, yonalish: dest, mijozLoc: {lat: pos.coords.latitude, lon: pos.coords.longitude} })
                });
                alert("Buyurtmangiz yuborildi!");
            });
        }

        async function yuklash() {
            const res = await fetch('/admin/buyurtmalar');
            const data = await res.json();
            const list = document.getElementById('list');
            if(!list) return;
            list.innerHTML = '';
            
            Object.values(markers).forEach(m => map.removeLayer(m));
            markers = {};

            data.forEach(item => {
                if(item.holati === 'Kutilmoqda') {
                    markers[item._id] = L.marker([item.mijozLoc.lat, item.mijozLoc.lon]).addTo(map).bindPopup(item.mijoz);
                }

                if(currentRole === 'driver' && item.holati === 'Kutilmoqda') {
                    list.innerHTML += `<div class="bg-gray-50 p-4 rounded-2xl flex justify-between items-center border border-yellow-100">
                        <div><b class="text-sm block">${item.yonalish}</b><span class="text-xs text-gray-400">${item.mijoz}</span></div>
                        <button onclick="qabul('${item._id}')" class="bg-black text-white px-5 py-2 rounded-xl text-xs font-bold">OLISH</button>
                    </div>`;
                } else if(currentRole === 'admin') {
                    list.innerHTML += `<div class="p-3 border-b flex justify-between items-center text-xs">
                        <div><b>${item.mijoz}</b><br>${item.yonalish}</div>
                        <span class="font-bold ${item.holati==='Kutilmoqda'?'text-orange-500':'text-green-600'}">${item.holati}</span>
                    </div>`;
                }
            });
        }

        async function qabul(id) {
            await fetch('/buyurtma/qabul', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({ orderId:id, haydovchiIsm:userTel })
            });
            alert("Muvaffaqiyatli qabul qilindi!");
            yuklash();
        }

        socket.on('yangilash_chiqdi', yuklash);
    </script>
</body>
</html>
