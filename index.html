<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Taxi - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 350px; width: 100%; border-radius: 20px; z-index: 1; }
        .tab-content { transition: all 0.3s; }
    </style>
</head>
<body class="bg-gray-100">

    <nav class="bg-slate-900 text-white p-4 shadow-2xl flex justify-between items-center sticky top-0 z-[1000]">
        <h1 class="text-xl font-black italic text-yellow-400">VILOYAT TAXI 24/7</h1>
        <div class="flex gap-2">
            <button onclick="adminLogin()" class="text-[10px] border border-gray-600 px-2 py-1 rounded">ADMIN</button>
            <button onclick="switchTab('driver-panel')" class="bg-yellow-500 text-black px-3 py-1 rounded-full text-[10px] font-bold">HAYDOVCHI</button>
        </div>
    </nav>

    <div class="container mx-auto p-4">
        <div id="map" class="mb-4 shadow-inner border-2 border-white"></div>

        <div id="mijoz-section" class="tab-content">
            <div class="bg-white p-6 rounded-3xl shadow-xl">
                <h2 class="font-bold mb-4">Taxi Buyurtma Berish</h2>
                <input id="mijozIsmi" type="text" placeholder="Ismingiz" class="w-full p-4 bg-gray-50 rounded-2xl mb-3 outline-none border">
                <input id="mijozTel" type="tel" placeholder="+998 90 123 45 67" class="w-full p-4 bg-gray-50 rounded-2xl mb-3 outline-none border">
                <select id="yonalish" class="w-full p-4 bg-gray-50 rounded-2xl mb-4 border font-medium">
                    <option value="Toshkent ➔ Samarqand">Toshkent ➔ Samarqand</option>
                    <option value="Samarqand ➔ Toshkent">Samarqand ➔ Toshkent</option>
                </select>
                <button onclick="buyurtmaYuborish()" class="w-full bg-slate-900 text-yellow-400 py-5 rounded-2xl font-black shadow-lg active:scale-95 transition">BUYURTMA BERISH</button>
            </div>
            <div id="mijozStatus" class="mt-4 hidden p-4 bg-blue-600 text-white rounded-2xl animate-pulse">
                Haydovchi siz tomonga yo'lda...
            </div>
        </div>

        <div id="orders-section" class="tab-content hidden">
            <div class="bg-white rounded-2xl shadow-lg overflow-x-auto">
                <table class="w-full">
                    <tbody id="buyurtmaTable"></tbody>
                </table>
            </div>
        </div>

        <div id="driver-panel-section" class="tab-content hidden grid gap-4"></div>
    </div>

    <script>
        const socket = io();
        let map = L.map('map').setView([41.2995, 69.2401], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let markers = {}, driverMarker, joriyHaydovchi = "";

        async function adminLogin() {
            const pass = prompt("Admin parolini kiriting:");
            const res = await fetch('/admin/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({password: pass})
            });
            if(res.ok) switchTab('orders');
            else alert("Parol noto'g'ri!");
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tab + '-section').classList.remove('hidden');
            if(tab === 'driver-panel' && !joriyHaydovchi) joriyHaydovchi = prompt("F.I.SH:");
        }

        async function buyurtmaYuborish() {
            const ism = document.getElementById('mijozIsmi').value;
            const tel = document.getElementById('mijozTel').value;
            if(!ism || !tel) return alert("Ma'lumotlarni to'ldiring!");

            navigator.geolocation.getCurrentPosition((pos) => {
                fetch('/buyurtma/berish', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ ism, tel, yonalish: document.getElementById('yonalish').value, mijozLoc: {lat: pos.coords.latitude, lon: pos.coords.longitude} })
                });
                alert("Buyurtmangiz qabul qilindi, haydovchini kuting!");
            });
        }

        async function qabulQilish(id) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await fetch('/buyurtma/qabul', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ orderId: id, haydovchiIsm: joriyHaydovchi, haydovchiLoc: {lat: pos.coords.latitude, lon: pos.coords.longitude} })
                });
            });
        }

        async function yakunlash(id) {
            await fetch('/buyurtma/yakunlash', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ orderId: id }) });
        }

        async function yuklash() {
            const res = await fetch('/admin/buyurtmalar');
            const data = await res.json();
            const table = document.getElementById('buyurtmaTable');
            const dPanel = document.getElementById('driver-panel-section');
            const mStatus = document.getElementById('mijozStatus');

            table.innerHTML = ''; dPanel.innerHTML = '';
            Object.values(markers).forEach(m => map.removeLayer(m)); markers = {};

            data.forEach(item => {
                // Admin
                table.innerHTML += `<tr class="border-b"><td class="p-4"><b>${item.mijoz}</b><br><small>${item.tel}</small></td><td class="p-4 text-xs">${item.holati}</td></tr>`;

                // Haydovchi uchun
                if(item.holati === 'Kutilmoqda') {
                    markers[item._id] = L.marker([item.mijozLoc.lat, item.mijozLoc.lon]).addTo(map).bindPopup("Mijoz: " + item.mijoz);
                    dPanel.innerHTML += `<div class="bg-white p-4 rounded-2xl shadow border-l-4 border-yellow-400">
                        <b>${item.yonalish}</b><p class="text-sm">${item.mijoz}</p>
                        <button onclick="qabulQilish('${item._id}')" class="w-full mt-2 bg-slate-900 text-white py-2 rounded-xl">QABUL QILISH</button>
                    </div>`;
                } else if(item.holati === "Yo'lda" && item.haydovchi === joriyHaydovchi) {
                    mStatus.classList.remove('hidden');
                    dPanel.innerHTML += `<div class="bg-green-50 p-4 rounded-2xl border-l-4 border-green-600">
                        <b>YO'LDASIZ</b><p class="text-sm">${item.mijoz}</p>
                        <button onclick="yakunlash('${item._id}')" class="w-full mt-2 bg-green-600 text-white py-2 rounded-xl uppercase">Manzilga keldik</button>
                    </div>`;
                }
            });
        }

        // Jonli haydovchi harakati
        socket.on('haydovchi_harakati', (data) => {
            if(driverMarker) map.removeLayer(driverMarker);
            driverMarker = L.marker([data.loc.lat, data.loc.lon], {
                icon: L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448327.png', iconSize: [30, 30] })
            }).addTo(map).bindPopup("Haydovchingiz shu yerda");
        });

        socket.on('yangilash_chiqdi', yuklash);
        window.onload = yuklash;
    </script>
</body>
</html>
