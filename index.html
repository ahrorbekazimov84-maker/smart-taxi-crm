<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yandex Taxi CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: sans-serif; background: #f3f4f6; }
        .page { display: none; height: 100vh; width: 100%; position: fixed; top: 0; left: 0; background: #fff; }
        .page.active { display: flex; flex-direction: column; }
        #map { flex-grow: 1; width: 100%; z-index: 1; }
        .bottom-sheet { background: white; border-radius: 24px 24px 0 0; padding: 20px; box-shadow: 0 -10px 25px rgba(0,0,0,0.1); z-index: 100; }
        .yandex-btn { background: #ffcc00; color: #000; font-weight: 700; padding: 16px; border-radius: 16px; width: 100%; }
        .input-group { background: #f0f0f0; border-radius: 12px; padding: 12px; margin-bottom: 10px; display: flex; align-items: center; }
        .input-group input, .input-group select { background: transparent; width: 100%; outline: none; border: none; font-size: 16px; margin-left: 10px; }
    </style>
</head>
<body>

    <div id="home-page" class="page active bg-black text-white justify-center p-8">
        <h1 class="text-4xl font-black mb-10 italic">Yandex Go</h1>
        <div onclick="showLogin('passenger')" class="bg-zinc-900 p-6 rounded-2xl mb-4 flex items-center gap-4 border-l-4 border-yellow-400">
            <span class="text-3xl">📱</span>
            <div><b class="text-lg block">Yo'lovchi</b><p class="text-xs text-gray-500">Taxi buyurtma qilish</p></div>
        </div>
        <div onclick="showLogin('driver')" class="bg-zinc-900 p-6 rounded-2xl mb-10 flex items-center gap-4 border-l-4 border-white">
            <span class="text-3xl">🚕</span>
            <div><b class="text-lg block">Haydovchi</b><p class="text-xs text-gray-500">Buyurtma qabul qilish</p></div>
        </div>
        <button onclick="showLogin('admin')" class="text-gray-500 underline text-sm w-full">Admin panel</button>
    </div>

    <div id="login-page" class="page p-6">
        <button onclick="location.reload()" class="mb-10 text-2xl">✕</button>
        <div id="auth-container"></div>
    </div>

    <div id="main-dashboard" class="page">
        <div id="map"></div>
        <div class="bottom-sheet">
            <div class="w-10 h-1 bg-gray-300 rounded-full mx-auto mb-4"></div>
            <div id="app-content"></div>
        </div>
    </div>

    <script>
        const socket = io();
        let currentRole = '', userTel = '', sentOTP = '', map, markers = [];

        function showLogin(role) {
            currentRole = role;
            document.getElementById('home-page').classList.remove('active');
            document.getElementById('login-page').classList.add('active');
            const container = document.getElementById('auth-container');

            if(role === 'admin') {
                container.innerHTML = `<h2 class="text-2xl font-bold mb-6">Admin</h2>
                    <div class="input-group">👤<input id="adm_login" type="text" placeholder="Login"></div>
                    <div class="input-group">🔒<input id="adm_pass" type="password" placeholder="Parol"></div>
                    <button onclick="loginAdmin()" class="yandex-btn mt-4">KIRISH</button>`;
            } else {
                container.innerHTML = `<h2 class="text-2xl font-bold mb-2">${role==='driver'?'Haydovchi':'Yo\'lovchi'}</h2>
                    <p class="text-gray-500 mb-6 italic">Tasdiqlash kodi yuboriladi</p>
                    <div class="input-group">📞<input id="user_tel" type="tel" value="+998"></div>
                    <div id="otp-box" class="input-group hidden">🔑<input id="user_code" type="number" placeholder="Kod"></div>
                    <button id="auth-btn" onclick="sendSMS()" class="yandex-btn mt-4">KOD OLISH</button>`;
            }
        }

        async function sendSMS() {
            userTel = document.getElementById('user_tel').value;
            const res = await fetch('/auth/send-code', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tel:userTel}) });
            const data = await res.json();
            sentOTP = data.debug_code; alert("KOD: " + sentOTP);
            document.getElementById('otp-box').classList.remove('hidden');
            const btn = document.getElementById('auth-btn'); btn.innerText = "TASDIQLASH"; btn.onclick = verifyOTP;
        }

        function verifyOTP() {
            if(document.getElementById('user_code').value == sentOTP) startDashboard();
            else alert("Xato kod!");
        }

        async function loginAdmin() {
            const res = await fetch('/admin/login', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({login:document.getElementById('adm_login').value, pass:document.getElementById('adm_pass').value})
            });
            if(res.ok) startDashboard(); else alert("Xato!");
        }

        function startDashboard() {
            document.getElementById('login-page').classList.remove('active');
            document.getElementById('main-dashboard').classList.add('active');
            if(!map) {
                map = L.map('map', {zoomControl:false}).setView([41.2995, 69.2401], 12);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            }
            loadInterface();
            yuklash();
        }

        function loadInterface() {
            const content = document.getElementById('app-content');
            if(currentRole === 'passenger') {
                content.innerHTML = `<div class="input-group">🏁<select id="dest"><option>Toshkent ➔ Samarqand</option><option>Samarqand ➔ Toshkent</option></select></div>
                    <button onclick="orderTaxi()" class="yandex-btn mt-2">TAXI CHAQIRISH</button>`;
            } else if(currentRole === 'driver') {
                content.innerHTML = `<h3 class="font-bold mb-3 text-gray-500">YANGI BUYURTMALAR</h3><div id="list" class="space-y-3"></div>`;
            } else {
                content.innerHTML = `<h3 class="font-bold mb-3 text-red-500 uppercase">Admin: Barcha buyurtmalar</h3><div id="list" class="space-y-2 overflow-y-auto max-h-64"></div>`;
            }
        }

        async function orderTaxi() {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await fetch('/buyurtma/berish', {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({ ism: userTel, tel: userTel, yonalish: document.getElementById('dest').value, mijozLoc: {lat: pos.coords.latitude, lon: pos.coords.longitude} })
                });
                alert("Buyurtma berildi!");
            });
        }

        async function yuklash() {
            const res = await fetch('/admin/buyurtmalar');
            const data = await res.json();
            const list = document.getElementById('list');
            if(!list) return;
            list.innerHTML = '';
            
            data.forEach(item => {
                if(currentRole === 'driver' && item.holati === 'Kutilmoqda') {
                    list.innerHTML += `<div class="bg-gray-100 p-4 rounded-2xl flex justify-between items-center shadow-sm animate-fade-in">
                        <div><b class="block text-sm">${item.yonalish}</b><span class="text-xs text-gray-400">${item.mijoz}</span></div>
                        <button onclick="qabul('${item._id}')" class="bg-black text-white px-4 py-2 rounded-xl text-xs font-bold">OLISH</button>
                    </div>`;
                } else if(currentRole === 'admin') {
                    list.innerHTML += `<div class="bg-white p-3 border-b flex justify-between items-center text-xs">
                        <div><b>${item.mijoz}</b><br>${item.yonalish}</div>
                        <div class="font-bold ${item.holati==='Kutilmoqda'?'text-orange-500':'text-green-600'}">${item.holati}</div>
                    </div>`;
                }
            });
        }

        async function qabul(id) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await fetch('/buyurtma/qabul', {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({ orderId:id, haydovchiIsm:userTel, haydovchiLoc:{lat:pos.coords.latitude, lon:pos.coords.longitude} })
                });
                alert("Siz buyurtmani oldingiz!");
            });
        }

        socket.on('yangilash_chiqdi', yuklash);
    </script>
</body>
</html>
