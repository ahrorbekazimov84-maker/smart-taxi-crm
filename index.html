<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yandex Go Style CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; overflow: hidden; }
        .page { display: none; height: 100vh; width: 100%; position: fixed; top: 0; left: 0; background: #fff; }
        .page.active { display: flex; flex-direction: column; }
        #map { flex-grow: 1; width: 100%; z-index: 1; }
        
        /* Yandex Go uslubidagi pastki menyu (Sheet) */
        .bottom-sheet {
            background: white;
            border-radius: 24px 24px 0 0;
            padding: 20px;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.1);
            z-index: 100;
            position: relative;
        }
        .yandex-btn {
            background-color: #ffcc00; /* Yandex Yellow */
            color: #000;
            font-weight: 700;
            padding: 16px;
            border-radius: 16px;
            width: 100%;
            transition: all 0.2s;
        }
        .yandex-btn:active { transform: scale(0.97); background-color: #f5c200; }
        .input-group { background: #f0f0f0; border-radius: 12px; padding: 12px; margin-bottom: 8px; }
        .input-group input, .input-group select { background: transparent; width: 100%; outline: none; border: none; font-size: 16px; }
        
        /* Rol tanlash sahifasi */
        #home-page { background: #000; color: white; justify-content: center; }
        .role-card { background: #1c1c1e; border-radius: 20px; padding: 24px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; width: 90%; }
    </style>
</head>
<body>

    <div id="home-page" class="page active">
        <div class="p-8">
            <h1 class="text-3xl font-extrabold mb-2">Xayrli kech</h1>
            <p class="text-gray-400 mb-8">Qayerga boramiz?</p>
            
            <div onclick="showLogin('passenger')" class="role-card border-l-4 border-yellow-400">
                <span class="text-3xl">📱</span>
                <div><b class="text-lg block">Yo'lovchi</b><span class="text-xs text-gray-500">Mashina chaqirish</span></div>
            </div>
            
            <div onclick="showLogin('driver')" class="role-card border-l-4 border-white">
                <span class="text-3xl">🚕</span>
                <div><b class="text-lg block">Haydovchi</b><span class="text-xs text-gray-500">Daromad qilish</span></div>
            </div>

            <button onclick="showLogin('admin')" class="text-gray-600 mt-10 w-full text-center text-sm underline">Admin boshqaruvi</button>
        </div>
    </div>

    <div id="login-page" class="page bg-white p-6">
        <button onclick="location.reload()" class="mb-8 text-2xl font-bold">✕</button>
        <div id="auth-container"></div>
    </div>

    <div id="main-dashboard" class="page">
        <div id="map"></div>
        
        <div class="bottom-sheet">
            <div class="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mb-6"></div>
            <div id="app-content">
                </div>
        </div>
    </div>

    <script>
        const socket = io();
        let currentRole = '', userTel = '', sentOTP = '';
        let map, markers = {}, driverMarker;

        function showLogin(role) {
            currentRole = role;
            document.getElementById('home-page').classList.remove('active');
            document.getElementById('login-page').classList.add('active');
            const container = document.getElementById('auth-container');

            if(role === 'admin') {
                container.innerHTML = `
                    <h2 class="text-2xl font-black mb-6">Admin panel</h2>
                    <div class="input-group"><input id="adm_login" type="text" placeholder="Login"></div>
                    <div class="input-group"><input id="adm_pass" type="password" placeholder="Parol"></div>
                    <button onclick="loginAdmin()" class="yandex-btn mt-4">KIRISH</button>
                `;
            } else {
                container.innerHTML = `
                    <h2 class="text-2xl font-black mb-2">${role === 'driver' ? 'Haydovchi' : 'Yo\'lovchi'}</h2>
                    <p class="text-gray-500 mb-8 text-sm">Raqamingizga tasdiqlash kodi yuboriladi</p>
                    <div class="input-group"><input id="user_tel" type="tel" placeholder="+998" value="+998"></div>
                    <div id="otp-box" class="input-group hidden mt-2"><input id="user_code" type="number" placeholder="0000"></div>
                    <button id="auth-btn" onclick="sendSMS()" class="yandex-btn mt-6">KOD OLISH</button>
                `;
            }
        }

        async function sendSMS() {
            userTel = document.getElementById('user_tel').value;
            const res = await fetch('/auth/send-code', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ tel: userTel }) });
            const data = await res.json();
            sentOTP = data.debug_code;
            alert("SMS KOD: " + sentOTP);
            document.getElementById('otp-box').classList.remove('hidden');
            const btn = document.getElementById('auth-btn');
            btn.innerText = "KIRISH";
            btn.onclick = verifyOTP;
        }

        function verifyOTP() {
            if(document.getElementById('user_code').value == sentOTP) startDashboard();
            else alert("Kod xato!");
        }

        async function loginAdmin() {
            const res = await fetch('/admin/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({login: document.getElementById('adm_login').value, pass: document.getElementById('adm_pass').value})
            });
            if(res.ok) startDashboard();
            else alert("Xato!");
        }

        function startDashboard() {
            document.getElementById('login-page').classList.remove('active');
            document.getElementById('main-dashboard').classList.add('active');
            initMap();
            loadInterface();
        }

        function initMap() {
            if(!map) {
                map = L.map('map', {zoomControl: false}).setView([41.2995, 69.2401], 13);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            }
        }

        function loadInterface() {
            const content = document.getElementById('app-content');
            if(currentRole === 'passenger') {
                content.innerHTML = `
                    <div class="space-y-3">
                        <div class="input-group">📍 <input type="text" value="Hozirgi joylashuv" readonly></div>
                        <div class="input-group">🏁 <select id="dest"><option>Toshkent ➔ Samarqand</option><option>Samarqand ➔ Toshkent</option></select></div>
                        <button onclick="orderTaxi()" class="yandex-btn">TAXI CHAQIRISH</button>
                    </div>
                `;
            } else if(currentRole === 'driver') {
                content.innerHTML = `<h3 class="font-bold mb-4">Aktiv buyurtmalar</h3><div id="driver-orders" class="space-y-3"></div>`;
                updateLists();
            } else {
                content.innerHTML = `<h3 class="font-bold mb-4">Barcha buyurtmalar</h3><div id="admin-list" class="space-y-2"></div>`;
                updateLists();
            }
        }

        async function orderTaxi() {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await fetch('/buyurtma/berish', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        ism: userTel, 
                        tel: userTel, 
                        yonalish: document.getElementById('dest').value, 
                        mijozLoc: {lat: pos.coords.latitude, lon: pos.coords.longitude} 
                    })
                });
                alert("Buyurtma berildi!");
            });
        }

        async function updateLists() {
            const res = await fetch('/admin/buyurtmalar');
            const data = await res.json();
            if(currentRole === 'driver') {
                const div = document.getElementById('driver-orders');
                div.innerHTML = '';
                data.filter(i => i.holati === 'Kutilmoqda').forEach(item => {
                    div.innerHTML += `
                        <div class="bg-gray-100 p-4 rounded-2xl flex justify-between items-center">
                            <div><b>${item.yonalish}</b><p class="text-xs text-gray-500">${item.mijoz}</p></div>
                            <button onclick="qabul('${item._id}')" class="bg-black text-white px-4 py-2 rounded-xl text-sm">OLISH</button>
                        </div>`;
                });
            }
        }

        async function qabul(id) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await fetch('/buyurtma/qabul', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ orderId: id, haydovchiIsm: userTel, haydovchiLoc: {lat: pos.coords.latitude, lon: pos.coords.longitude} })
                });
                alert("Buyurtma olindi!");
            });
        }

        socket.on('yangilash_chiqdi', updateLists);
    </script>
</body>
</html>
